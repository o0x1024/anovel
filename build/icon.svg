<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1628"/>
      <stop offset="100%" stop-color="#0f0d18"/>
    </linearGradient>
    <linearGradient id="accent" x1="18%" y1="12%" x2="88%" y2="92%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="52%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <!-- macOS HIG: icon shape ~824x824 centered in 1024 canvas, ~100px padding -->
  <rect x="100" y="100" width="824" height="824" rx="180" fill="url(#bg)"/>
  <rect x="138" y="138" width="748" height="748" rx="158" fill="none" stroke="#8b5cf6" stroke-opacity="0.22" stroke-width="3"/>
  <ellipse cx="512" cy="342" rx="290" ry="177" fill="url(#glow)"/>
  <!-- project-diagram nodes -->
  <g filter="url(#shadow)" stroke="url(#accent)" stroke-width="23" stroke-linecap="round" fill="none">
    <line x1="512" y1="342" x2="358" y2="599"/>
    <line x1="512" y1="342" x2="666" y2="599"/>
    <line x1="358" y1="599" x2="666" y2="599"/>
  </g>
  <circle cx="512" cy="342" r="42" fill="url(#accent)"/>
  <circle cx="358" cy="599" r="35" fill="#a78bfa"/>
  <circle cx="666" cy="599" r="35" fill="#f472b6"/>
  <!-- bold "A" mark -->
  <text
    x="512"
    y="728"
    text-anchor="middle"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="274"
    font-weight="800"
    fill="url(#accent)"
    letter-spacing="-10"
  >A</text>
</svg>
